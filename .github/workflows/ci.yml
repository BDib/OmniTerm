name: CI

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ── Test across Python versions ──
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/ --select E402,F || true

    - name: Run tests
      run: |
        python -m tests.run_all
      timeout-minutes: 3
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Build (PyInstaller check)
      if: success() && matrix.python-version == '3.12'
      run: pyinstaller OmniTerm.spec --noconfirm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: matrix.python-version == '3.12'
      with:
        name: OmniTerm-pyinstaller-${{ github.sha }}
        path: dist/pyOmniTerm.exe

  # ── Build with Nuitka + create installer (on tag push) ──
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install nuitka

    - name: Build with Nuitka
      run: python -m nuitka --standalone --enable-plugin=pyqt6 --output-dir=dist_nuitka --output-filename=OmniTerm.exe --include-data-file=settings.toml=settings.toml --include-package=winpty --include-package=serial --include-package=paramiko --include-package=toml --nofollow-import-to=tkinter,matplotlib,numpy,scipy,pandas,pytest,unittest --windows-console-mode=disable src/Main.py

    - name: Copy Nuitka build to dist
      run: |
        mkdir dist
        cp -r dist_nuitka/Main.dist/* dist/

    - name: Build PyInstaller (fallback)
      run: |
        pip install pyinstaller
        pyinstaller OmniTerm.spec --noconfirm

    - name: Install Inno Setup
      run: |
        choco install innosetup -y --no-progress

    - name: Build installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\omniterm.iss

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        files: |
          dist/OmniTerm.exe
          dist/pyOmniTerm.exe
          installer_output/OmniTermSetup.exe
        generate_release_notes: true
        draft: false
        prerelease: false
