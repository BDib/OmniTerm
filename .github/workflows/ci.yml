name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ── Test across Python versions on Windows ──
  test:
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/ --select E402,F || true

    - name: Run tests
      run: python -m pytest tests/ -q --tb=short
      timeout-minutes: 3
      env:
        QT_QPA_PLATFORM: offscreen

  # ── Build standalone executables on tag push ──
  build:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows
            arch: x64
          - os: windows-11-arm
            platform: windows
            arch: arm64
          - os: ubuntu-latest
            platform: linux
            arch: x64
          - os: ubuntu-24.04-arm
            platform: linux
            arch: arm64
          - os: macos-14
            platform: macos
            arch: arm64
          - os: macos-15-intel
            platform: macos
            arch: x64
    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Build executable
      run: pyinstaller OmniTerm.spec --noconfirm

    # ── Windows: zip ──
    - name: Windows Post-Build
      if: matrix.platform == 'windows'
      run: |
        Compress-Archive -Path dist/OmniTerm-windows-x64.exe -DestinationPath dist/OmniTerm-windows-${{ matrix.arch }}.zip
      shell: powershell

    # ── Linux: tar.gz ──
    - name: Linux Post-Build
      if: matrix.platform == 'linux'
      run: |
        cd dist
        tar -czf OmniTerm-linux-${{ matrix.arch }}.tar.gz OmniTerm-windows-x64
      shell: bash

    # ── macOS: zip ──
    - name: macOS Post-Build
      if: matrix.platform == 'macos'
      run: |
        cd dist
        zip -r OmniTerm-macos-${{ matrix.arch }}.zip OmniTerm-windows-x64
      shell: bash

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: OmniTerm-${{ matrix.platform }}-${{ matrix.arch }}
        path: |
          dist/*.zip
          dist/*.tar.gz

  # ── Create GitHub Release (on tag push only) ──
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: artifacts

    - name: Prepare Release Files
      run: |
        mkdir release_files
        find artifacts -type f \( -name "*.zip" -o -name "*.tar.gz" \) -exec cp {} release_files/ \;
        ls -la release_files

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: OmniTerm ${{ github.ref_name }}
        tag_name: ${{ github.ref_name }}
        body: |
          ## OmniTerm ${{ github.ref_name }}

          Modern cross-platform terminal emulator with native RTL support, Arabic shaping, and unified terminal screen.

          ### Downloads
          | Platform | File | Description |
          |----------|------|-------------|
          | **Windows (x64)** | `OmniTerm-windows-x64.zip` | Standalone binary |
          | **Windows (ARM64)** | `OmniTerm-windows-arm64.zip` | Standalone binary |
          | **Linux (x64)** | `OmniTerm-linux-x64.tar.gz` | Standalone binary |
          | **Linux (ARM64)** | `OmniTerm-linux-arm64.tar.gz` | Standalone binary |
          | **macOS (Intel x64)** | `OmniTerm-macos-x64.zip` | Intel binary |
          | **macOS (ARM64)** | `OmniTerm-macos-arm64.zip` | Apple Silicon binary |

          ### Requirements
          - No Python installation required.
          - Windows 10+ (x64/ARM64), Linux (x64/ARM64), macOS 11+ (x64/ARM64)
        files: |
          release_files/*
        draft: false
        prerelease: false
