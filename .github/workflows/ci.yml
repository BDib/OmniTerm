name: CI

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]

jobs:
  # ── Test across Python versions ──
  test:
    runs-on: windows-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12', '3.13']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Lint with ruff
      run: |
        pip install ruff
        ruff check src/ tests/ --select E402,F || true

    - name: Run tests
      run: python -m pytest tests/ -q --tb=short
      timeout-minutes: 3
      env:
        QT_QPA_PLATFORM: offscreen

    - name: Build (PyInstaller check)
      if: success() && matrix.python-version == '3.12'
      run: pyinstaller OmniTerm.spec --noconfirm

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      if: matrix.python-version == '3.12'
      with:
        name: OmniTerm-win10-x64-pyinstaller-${{ github.sha }}
        path: dist/pyOmniTerm-win10-x64.exe

  # ── Build with PyInstaller + installer (on tag push only) ──
  release:
    needs: test
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Build with PyInstaller
      run: pyinstaller OmniTerm.spec --noconfirm

    - name: Install Inno Setup
      run: choco install innosetup -y --no-progress

    - name: Build installer
      run: |
        & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\omniterm.iss

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        name: OmniTerm ${{ github.ref_name }} — Windows 10/11 x64
        tag_name: ${{ github.ref_name }}
        body: |
          ## OmniTerm ${{ github.ref_name }} — Windows 10/11 x64

          Lightweight terminal emulator built with Python + PyQt6.

          ### Downloads
          | File | Description |
          |------|-------------|
          | `pyOmniTerm-win10-x64.exe` | PyInstaller standalone build (~40 MB) |
          | `OmniTermSetup-win10-x64.exe` | Inno Setup installer |

          ### Requirements
          - Windows 10 (build 17763+) or Windows 11, x64
          - No Python installation required

          ### Nuitka build
          For faster startup (~13ms vs ~97ms), build locally with:
          ```
          .\build.ps1 nuitka
          ```
        files: |
          dist/pyOmniTerm-win10-x64.exe
          installer/installer_output/OmniTermSetup-win10-x64.exe
        draft: false
        prerelease: false
