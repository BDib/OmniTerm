# OmniTerm Configuration File

[behavior]
# Sensitivity for automatic RTL alignment (0.0 to 1.0)
# 0.7 means a line must be 70% Arabic/Hebrew to flip to the right
rtl_threshold = 0.7

[ui]
# Window appearance
opacity = 0.98
font_family = "Cascadia Code"
font_size = 14
theme = "campbell"

# Cursor style: "bar" | "block" | "underline"
cursor_style = "bar"
# Whether the cursor blinks
cursor_blink = true

# ── Shell Profiles ─────────────────────────────────────────────────────
# Each profile defines a shell command and optional settings.
# Use Ctrl+Shift+N to open a new tab with the profile picker.

default_profile = "cmd"

[profiles.cmd]
command = "cmd.exe"

[profiles.powershell]
command = "powershell.exe"
args = ["-NoLogo"]

[profiles.pwsh]
command = "pwsh.exe"
args = ["-NoLogo"]

[profiles.wsl]
command = "wsl.exe"

[profiles.git_bash]
command = "C:\\Program Files\\Git\\bin\\bash.exe"

# ── Custom Keybindings ─────────────────────────────────────────────────
# Map a shortcut to a built-in action.
# Available actions: new_tab, close_tab, next_tab, prev_tab,
#   split_horizontal, split_vertical, font_bigger, font_smaller,
#   font_reset, theme_cycle, theme_picker, toggle_opacity,
#   copy, paste, find, profile_picker

[keybindings]
"Ctrl+Shift+N" = "profile_picker"
"Ctrl+Shift+F" = "find"
